version: '3.8'

services:
  mongodb:
    image: mongo:7-alpine
    container_name: secondbrain-mongo
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: secondBrain
    volumes:
      - mongo-data:/data/db
    networks:
      - secondbrain-network

  backend:
    build: .
    container_name: secondbrain-backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      API_BASE_URL: http://localhost:5000
      MONGODB_URI: mongodb://mongodb:27017/secondBrain
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-min-32-chars-here-12345}
      JWT_EXPIRATION: 7d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 10
      APP_URL: http://localhost:5000
    depends_on:
      - mongodb
    networks:
      - secondbrain-network

volumes:
  mongo-data:

networks:
  secondbrain-network:
    driver: bridge
